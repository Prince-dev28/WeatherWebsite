<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style1.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="shortcut icon" href="https://image.winudf.com/v2/image1/aW8ubW9iaWxpemUuYXBwLnRlY2huYXRpb25faWNvbl8xNTg0MDQ1OTc4XzAwMw/icon.png?w=184&fakeurl=1" type="image/x-icon">

</head>
<body>
  <div class="login-container">
    <img src="https://image.winudf.com/v2/image1/aW8ubW9iaWxpemUuYXBwLnRlY2huYXRpb25faWNvbl8xNTg0MDQ1OTc4XzAwMw/icon.png?w=184&fakeurl=1" alt="" width="60px">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
      <p>Don't have an account? <a href="register.html">Register</a></p>

    </form>
    <p id="errorMsg"></p>
    <div class="social-icons">
      <a href="https://www.instagram.com/" target="_blank" class="instagram">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="https://www.linkedin.com/in/prince-kumar-jha-794565353/" target="_blank" class="linkedin">
        <i class="fab fa-linkedin"></i>
      </a>
      <a href="https://wa.me/your-number" target="_blank" class="whatsapp">
        <i class="fab fa-whatsapp"></i>
      </a>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
